name: rickandmorty
description: "An app that shows characters from the Rick and Morty TV show."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  get_it: ^9.2.1
  go_router: ^17.2.2
  intl: ^0.20.2
  path_provider: ^2.1.5
  path: ^1.9.1
  sembast: ^3.8.6
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.5
  alchemist: ^0.14.0

flutter:
  generate: true
  uses-material-design: true
  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron.ttf
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk.ttf
