name: Pull Request Validation

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Prepare CI environment
        uses: ./.github/actions/setup-flutter

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Run static analysis
        run: flutter analyze

  tests:
    name: Tests
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Prepare CI environment
        uses: ./.github/actions/setup-flutter

      - name: Install Very Good CLI
        run: dart pub global activate very_good_cli 1.1.1

      - name: Run tests
        run: very_good test --test-randomize-ordering-seed random
